name: physical-ai

description: Physical AI workflows for video analytics and perception — Video Search and Summarization (VSS) plus DeepStream — to deploy, search, summarize, alert, and report over real-world video.

display_name: NVIDIA Physical AI
short_description: Video analytics, search, and summarization for real-world physical AI — VSS and DeepStream.
long_description: A curated plugin bundling NVIDIA's external Physical AI skills across two products. Use Video Search and Summarization (VSS) to deploy blueprint profiles, search and summarize video archives, ask visual questions, generate timestamped reports, manage alerts, and call RT-VLM and VIOS APIs. Use DeepStream to develop video analytics applications and import vision models for inference, tracking, and message brokers. Suitable for safety, operations, retail, traffic, and industrial perception use cases.

category: Developer Tools

keywords:
  - nvidia
  - physical-ai
  - vss
  - video-search-and-summarization
  - deepstream
  - video-analytics
  - perception
  - edge
  - rtsp
  - sensor

default_prompts:
  - "Search a video archive with VSS using natural language."
  - "Generate a timestamped video report from a deployed VSS stack."
  - "Build a DeepStream application that imports a vision model and runs TensorRT inference."
  - "Configure VSS alerts for safety or operations workflows."

# Using folder-level entries so the build script auto-discovers any new
# external skills added to either product later. Currently includes:
#   - skills/deepstream/         (2 skills)
#   - skills/video-search-and-summarization/  (10 skills)
include_skills:
  - skills/deepstream/
  - skills/video-search-and-summarization/

