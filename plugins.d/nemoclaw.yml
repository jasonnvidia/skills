name: nemoclaw

description: NemoClaw user workflows — install, configure, deploy, and operate NemoClaw sandboxes for agentic AI with policy, security, inference, and monitoring controls.

display_name: NVIDIA NemoClaw
short_description: Run agentic AI safely in NemoClaw sandboxes — install, configure, deploy, and monitor.
long_description: A curated plugin bundling NemoClaw's external user skills — installing skills, configuring inference and security, deploying remotely, managing local sandboxes and network policy, monitoring sandbox activity, and looking up CLI/reference behavior. Use this plugin to onboard NemoClaw, decide how it fits an OpenClaw/OpenShell stack, and operate sandboxes day-to-day.

category: Developer Tools

keywords:
  - nvidia
  - nemoclaw
  - agent-skills
  - agentic-ai
  - sandbox
  - safety
  - policy
  - openclaw
  - openshell

default_prompts:
  - "Install NemoClaw and launch a first sandbox."
  - "Configure NemoClaw inference providers and security policy."
  - "Deploy NemoClaw to a remote GPU environment."
  - "Monitor and approve NemoClaw sandbox activity."

# Some skills under skills/NemoClaw/ are intentionally excluded from this public plugin
# per the persona classification (Mixed / NVIDIA-internal scopes).
include_skills:
  - skills/NemoClaw/nemoclaw-user-agent-skills/
  - skills/NemoClaw/nemoclaw-user-configure-inference/
  - skills/NemoClaw/nemoclaw-user-configure-security/
  - skills/NemoClaw/nemoclaw-user-deploy-remote/
  - skills/NemoClaw/nemoclaw-user-get-started/
  - skills/NemoClaw/nemoclaw-user-manage-policy/
  - skills/NemoClaw/nemoclaw-user-manage-sandboxes/
  - skills/NemoClaw/nemoclaw-user-monitor-sandbox/
  - skills/NemoClaw/nemoclaw-user-overview/
  - skills/NemoClaw/nemoclaw-user-reference/

