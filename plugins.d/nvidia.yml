name: nvidia

description: Build with NVIDIA agent skills.

display_name: NVIDIA
short_description: Provide agentic guidance in your NVIDIA related workflows.
long_description: A curated plugin bundling verified skills to provide guidance in your NVIDIA related workflows.

category: Developer Tools
logo: ./assets/nvidia.png
composer_icon: ./assets/nvidia.png
# screenshots: []   # optional; supply ./assets/*.png paths when we have any

keywords:
  - nvidia
  - agent-skills
  - gpu

default_prompts:
  - "Solve an optimization problem with cuOpt."
  - "Deploy or debug an NVIDIA RAG Blueprint."
  - "Search a video archive with VSS."

# Curated subset of skills, packaged for delivery to upstream
# OpenAI Bundled / Anthropic Official marketplaces.
include_skills:
  - skills/cuopt/cuopt-numerical-optimization-api-python/
  - skills/cuopt/cuopt-install/
  - skills/NemoClaw/nemoclaw-user-get-started/

# Inherits from plugins.d/_defaults.yml:
#   version, author, homepage, repository, license,
#   brand_color, capabilities

# Published in both self-hosted marketplace.json files (default behaviour).
# The same plugins/nvidia/ tree is also hand-delivered to the external
# OpenAI and Anthropic marketplaces — the local publish is additive, not a
# substitute for the upstream submissions.
# marketplace_enabled:
#   claude: false
#   codex: false